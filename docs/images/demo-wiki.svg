<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <rect width="1200" height="760" fill="#f7f8fa"/>
  <text x="65" y="85" font-family="Arial, sans-serif" font-size="38" font-weight="700" fill="#18212f">LLM-Maintained Knowledge Flow</text>
  <text x="65" y="125" font-family="Arial, sans-serif" font-size="19" fill="#596579">Evidence stays traceable while maintained knowledge evolves.</text>
  <g font-family="Arial, sans-serif">
    <g transform="translate(65,190)"><rect width="190" height="260" rx="8" fill="#fff" stroke="#dce2ea"/><text x="22" y="38" font-size="13" font-weight="700" fill="#1b6b56">01</text><text x="22" y="82" font-size="21" font-weight="700" fill="#18212f">Raw Source</text><text x="22" y="120" font-size="15" fill="#667286">Official docs or</text><text x="22" y="145" font-size="15" fill="#667286">fictional private data</text></g>
    <g transform="translate(285,190)"><rect width="190" height="260" rx="8" fill="#fff" stroke="#dce2ea"/><text x="22" y="38" font-size="13" font-weight="700" fill="#1b6b56">02</text><text x="22" y="82" font-size="21" font-weight="700" fill="#18212f">Summary</text><text x="22" y="120" font-size="15" fill="#667286">Retention, exclusion,</text><text x="22" y="145" font-size="15" fill="#667286">reliability, verification</text></g>
    <g transform="translate(505,190)"><rect width="190" height="260" rx="8" fill="#fff" stroke="#dce2ea"/><text x="22" y="38" font-size="13" font-weight="700" fill="#1b6b56">03</text><text x="22" y="82" font-size="21" font-weight="700" fill="#18212f">Topic / Entity</text><text x="22" y="120" font-size="15" fill="#667286">Reusable rules and</text><text x="22" y="145" font-size="15" fill="#667286">maintained descriptions</text></g>
    <g transform="translate(725,190)"><rect width="190" height="260" rx="8" fill="#fff" stroke="#dce2ea"/><text x="22" y="38" font-size="13" font-weight="700" fill="#1b6b56">04</text><text x="22" y="82" font-size="21" font-weight="700" fill="#18212f">Synthesis</text><text x="22" y="120" font-size="15" fill="#667286">Multi-source judgment</text><text x="22" y="145" font-size="15" fill="#667286">with explicit conflicts</text></g>
    <g transform="translate(945,190)"><rect width="190" height="260" rx="8" fill="#fff" stroke="#dce2ea"/><text x="22" y="38" font-size="13" font-weight="700" fill="#1b6b56">05</text><text x="22" y="82" font-size="21" font-weight="700" fill="#18212f">Writeback</text><text x="22" y="120" font-size="15" fill="#667286">Update knowledge or</text><text x="22" y="145" font-size="15" fill="#667286">keep the answer transient</text></g>
  </g>
  <g fill="#e8f3ef" stroke="none"><rect x="65" y="510" width="150" height="42" rx="21"/><rect x="235" y="510" width="150" height="42" rx="21"/><rect x="405" y="510" width="150" height="42" rx="21"/><rect x="575" y="510" width="150" height="42" rx="21"/></g>
  <g font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#185a49"><text x="89" y="536">Source-linked</text><text x="259" y="536">Privacy-aware</text><text x="432" y="536">46 Python tests</text><text x="610" y="536">3 Node tests</text></g>
</svg>
